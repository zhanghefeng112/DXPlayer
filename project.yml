name: DXPlayerSDKDemo
options:
  bundleIdPrefix: com.dxplayer
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.3"

settings:
  SWIFT_VERSION: "5.0"

targets:
  # Framework Target
  DXPlayerSDK:
    type: framework
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: DXPlayerSDK/Sources
        type: group
      - path: DXPlayerSDK/Resources/Assets.xcassets
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_NAME: DXPlayerSDK
      PRODUCT_BUNDLE_IDENTIFIER: com.dxplayer.DXPlayerSDK
      SWIFT_VERSION: "5.0"
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      DEFINES_MODULE: YES
      SKIP_INSTALL: NO
      IPHONEOS_DEPLOYMENT_TARGET: "15.0"
      INFOPLIST_FILE: DXPlayerSDK/Info.plist
      FRAMEWORK_SEARCH_PATHS:
        - $(inherited)
        - $(PROJECT_DIR)/Frameworks/FSPlayer.xcframework/ios-arm64
        - $(PROJECT_DIR)/Frameworks/FSPlayer.xcframework/ios-arm64_x86_64-simulator
    dependencies:
      - framework: Frameworks/FSPlayer.xcframework
        embed: false
      - sdk: UIKit.framework
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
      - sdk: CoreMedia.framework
      - sdk: CoreGraphics.framework
    scheme:
      testTargets: []
      gatherCoverageData: false

  # Demo App Target (optional, for testing)
  DXPlayerSDKDemoApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: DemoApp
        type: group
        excludes:
          - TestResources
      - path: DemoApp/TestResources
        type: folder
        buildPhase: resources
        buildConfigs: [Debug]
    settings:
      PRODUCT_NAME: DXPlayerSDKDemoApp
      PRODUCT_BUNDLE_IDENTIFIER: com.dxplayer.www
      INFOPLIST_FILE: DemoApp/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: BQ6A4VMVJF
      CODE_SIGN_IDENTITY: "Apple Distribution: Nazar Hussain (BQ6A4VMVJF)"
      PROVISIONING_PROFILE_SPECIFIER: ad_hoc_profile
    dependencies:
      - target: DXPlayerSDK
        embed: true
      - framework: Frameworks/FSPlayer.xcframework
        embed: true
    scheme:
      testTargets: []
      gatherCoverageData: false

  # Unit Tests Target
  DXPlayerSDKTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: DXPlayerSDKTests
        type: group
    settings:
      SWIFT_VERSION: "5.0"
      PRODUCT_BUNDLE_IDENTIFIER: com.dxplayer.DXPlayerSDKTests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DXPlayerSDKDemoApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DXPlayerSDKDemoApp"
      BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: DXPlayerSDKDemoApp
        embed: false

schemes:
  DXPlayerSDK:
    build:
      targets:
        DXPlayerSDK: all
    run:
      config: Debug
    archive:
      config: Release

  DXPlayerSDKDemoApp:
    build:
      targets:
        DXPlayerSDKDemoApp: all
        DXPlayerSDKTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: DXPlayerSDKTests
